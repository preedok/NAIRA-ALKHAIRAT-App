# Batasi memori Gradle untuk hindari OOM (out of memory)
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:+HeapDumpOnOutOfMemoryError
# Disable daemon to avoid "Could not move temporary workspace" on Windows (file lock)
org.gradle.daemon=false
org.gradle.parallel=true
# Hindari error "Could not move temporary workspace" saat project di OneDrive
org.gradle.configuration-cache=false
org.gradle.unsafe.configuration-cache=false
android.useAndroidX=true
android.enableJetifier=true

# Java 25: Gradle 8.10 butuh JDK 17. Arahkan ke JBR Android Studio (sesuaikan path jika Studio di lokasi lain).
org.gradle.java.home=C\:\\Program Files\\Android\\Android Studio\\jbr
