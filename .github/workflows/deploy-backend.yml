# Auto-deploy backend + frontend ke VPS setiap push ke master
name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Manual trigger: Actions → Deploy to VPS → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GitHub Secrets (VPS)
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::Secret VPS_HOST belum diisi. Buka repo GitHub → Settings → Secrets and variables → Actions → New repository secret"
            echo "Tambahkan: VPS_HOST (contoh: 187.124.90.214), VPS_USERNAME (contoh: root), VPS_SSH_KEY (isi private key), VPS_SSH_PORT (contoh: 22)"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USERNAME }}" ]; then
            echo "::error::Secret VPS_USERNAME belum diisi."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::Secret VPS_SSH_KEY belum diisi (private key SSH untuk deploy)."
            exit 1
          fi
          echo "Secrets OK, melanjutkan deploy..."

      - name: Deploy Backend + Frontend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            APP_PATH="${{ secrets.APP_PATH }}"
            [ -z "$APP_PATH" ] && APP_PATH="/var/www/bgg-app"
            cd "$APP_PATH"
            
            echo "=== Pulling latest changes ==="
            git fetch origin master
            git reset --hard origin/master
            
            echo "=== Backend: install & migrate ==="
            cd "$APP_PATH/backend"
            npm ci
            npm run migrate 2>/dev/null || true
            echo "=== Backend: restart PM2 ==="
            pm2 restart bgg-backend --update-env || pm2 start src/server.js --name bgg-backend
            
            echo "=== Frontend: install & build ==="
            cd "$APP_PATH/frontend"
            npm ci
            npm run build
            
            echo "=== Deployment completed ==="
            pm2 status

      - name: Notify
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy berhasil (backend + frontend)"
          else
            echo "❌ Deploy gagal"
          fi
