# Auto-deploy backend + frontend ke VPS setiap push ke master
name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend + Frontend to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            APP_PATH="${{ secrets.APP_PATH }}"
            [ -z "$APP_PATH" ] && APP_PATH="/var/www/bgg-app"
            cd "$APP_PATH"
            
            echo "=== Pulling latest changes ==="
            git fetch origin master
            git reset --hard origin/master
            
            echo "=== Backend: install & migrate ==="
            cd "$APP_PATH/backend"
            npm ci
            npm run migrate 2>/dev/null || true
            echo "=== Backend: restart PM2 ==="
            pm2 restart bgg-backend --update-env || pm2 start src/server.js --name bgg-backend
            
            echo "=== Frontend: install & build ==="
            cd "$APP_PATH/frontend"
            npm ci
            npm run build
            
            echo "=== Deployment completed ==="
            pm2 status

      - name: Notify
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy berhasil (backend + frontend)"
          else
            echo "❌ Deploy gagal"
          fi
