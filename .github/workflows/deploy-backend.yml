# Auto-deploy backend + frontend ke VPS setiap push ke master
name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Manual trigger: Actions → Deploy to VPS → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GitHub Secrets (VPS)
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USERNAME }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "secrets_ok=false" >> $GITHUB_OUTPUT
            echo "::notice::Deploy dilewati: Secret VPS belum diisi. Tanpa ini auto-deploy tidak jalan."
            echo "Cara mengaktifkan: Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Tambahkan: VPS_HOST, VPS_USERNAME, VPS_SSH_KEY, VPS_SSH_PORT (lihat DEPLOY_SETUP.md)"
            echo "Atau deploy manual: jalankan .\deploy\run-deploy-from-windows.ps1 dari PC, atau SSH ke VPS lalu bash deploy/update-vps.sh"
            exit 0
          fi
          echo "secrets_ok=true" >> $GITHUB_OUTPUT
          echo "Secrets OK, melanjutkan deploy..."

      - name: Deploy Backend + Frontend to VPS
        if: steps.check-secrets.outputs.secrets_ok == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            APP_PATH="${{ secrets.APP_PATH }}"
            [ -z "$APP_PATH" ] && APP_PATH="/var/www/bgg-app"
            cd "$APP_PATH"
            
            echo "=== Pulling latest changes ==="
            git fetch origin master
            git reset --hard origin/master
            
            echo "=== Backend: install & migrate ==="
            cd "$APP_PATH/backend"
            npm ci
            npm run migrate 2>/dev/null || true
            echo "=== Backend: restart PM2 ==="
            pm2 restart bgg-backend --update-env || pm2 start src/server.js --name bgg-backend
            
            echo "=== Frontend: install & build ==="
            cd "$APP_PATH/frontend"
            npm ci
            npm run build
            
            echo "=== Deployment completed ==="
            pm2 status

      - name: Notify
        if: always()
        run: |
          if [ "${{ steps.check-secrets.outputs.secrets_ok }}" != "true" ]; then
            echo "⏭️ Deploy dilewati — isi VPS_HOST, VPS_USERNAME, VPS_SSH_KEY di Settings → Secrets untuk auto-deploy"
          elif [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy berhasil (backend + frontend)"
          else
            echo "❌ Deploy gagal"
          fi
