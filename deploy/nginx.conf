# Nginx configuration for BGG App
# Domain: insancitaintegrasi.id
# Subdomain dev: dev.bintangglobalgrup.insancitaintegrasi.id
# Pastikan DNS A/AAAA subdomain mengarah ke IP VPS yang sama, port 80/443 terbuka (ufw + cloud firewall),
# dan sertifikat SSL mencakup subdomain, mis.:
#   sudo certbot certonly --nginx -d insancitaintegrasi.id -d www.insancitaintegrasi.id -d dev.bintangglobalgrup.insancitaintegrasi.id

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Upstream for backend
upstream bgg_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name insancitaintegrasi.id www.insancitaintegrasi.id dev.bintangglobalgrup.insancitaintegrasi.id;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name insancitaintegrasi.id www.insancitaintegrasi.id dev.bintangglobalgrup.insancitaintegrasi.id;

    # SSL certificates (will be created by certbot)
    ssl_certificate /etc/letsencrypt/live/insancitaintegrasi.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insancitaintegrasi.id/privkey.pem;
    
    # SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "msie6";

    # Frontend (React build)
    root /var/www/bgg-app/frontend/build;
    index index.html;

    # Frontend routes
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API Backend proxy
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://bgg_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        # CORS ditangani oleh Express (cors + CORS_ORIGIN). Jangan set ACAO di sini — salah origin
        # memblokir login dari subdomain dev atau host lain.
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass http://bgg_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Uploads directory (sama dengan backend config: PROJECT_ROOT/uploads, bukan backend/uploads)
    location /uploads/ {
        alias /var/www/bgg-app/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Security
        location ~* \.(php|php5|phtml|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
