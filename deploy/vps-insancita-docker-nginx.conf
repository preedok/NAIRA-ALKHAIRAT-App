# Nginx untuk stack Docker insancita-integrasi + routing BGG dev (PM2 di host :5000).
# Letakkan di VPS: /var/www/insancita-integrasi/infra/nginx.conf
# Mount volume: /var/www/bgg-app/frontend/build -> /var/www/bgg-frontend
# Mount host certs: /etc/letsencrypt -> /etc/letsencrypt:ro

events {}

http {
  # Wajib: tanpa ini .css/.js dapat Content-Type text/plain → browser tidak memuat stylesheet (UI “tanpa CSS”).
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  resolver 127.0.0.11 valid=10s ipv6=off;
  limit_req_zone $binary_remote_addr zone=bgg_api_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=bgg_general_limit:10m rate=30r/s;

  server {
    listen 80;
    server_name insancitaintegrasi.id www.insancitaintegrasi.id;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      set $upstream_frontend http://frontend:80;
      proxy_pass $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name api.insancitaintegrasi.id;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      set $upstream_backend http://backend:4000;
      proxy_pass $upstream_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name dev.bintangglobalgrup.insancitaintegrasi.id;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.bintangglobalgrup.insancitaintegrasi.id;

    # Sertifikat sama dengan domain utama (certbot -d harus menyertakan dev subdomain); path per-subdomain sering belum ada → nginx gagal reload.
    ssl_certificate /etc/letsencrypt/live/insancitaintegrasi.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insancitaintegrasi.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/bgg-frontend;
    index index.html;

    location = /health {
      proxy_pass http://172.17.0.1:5000/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=bgg_api_limit burst=20 nodelay;
      proxy_pass http://172.17.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /socket.io/ {
      proxy_pass http://172.17.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    location /uploads/ {
      proxy_pass http://172.17.0.1:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=bgg_general_limit burst=50 nodelay;
      try_files $uri $uri/ /index.html;
    }
  }
}
